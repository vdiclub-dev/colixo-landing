<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colixo – Optimisation des expéditions</title>
<style>
body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 50px;}
input, textarea { width: 300px; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
button { padding: 10px 20px; border: none; border-radius: 5px; background: #fff; color: #000; font-weight: bold; cursor: pointer;}
</style>
</head>
<body>

<h1>Optimisez vos expéditions</h1>
<form id="contactForm">
  <input type="text" name="company" placeholder="Nom de l’entreprise" required><br>
  <input type="email" name="email" placeholder="Email" required><br>
  <textarea name="needs" placeholder="Votre besoin (optionnel)"></textarea><br>
  <button type="submit">Être contacté</button>
</form>

<p id="result"></p>

<script>
const form = document.getElementById('contactForm');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(form);
  const data = {
    email: formData.get('email'),
    attributes: {
      COMPANY: formData.get('company'),
      NEEDS: formData.get('needs') || ''
    }
  };

  const res = await fetch('/send', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });

  const result = await res.json();
  document.getElementById('result').innerText = result.message;
  form.reset();
});
</script>

</body>
</html>
