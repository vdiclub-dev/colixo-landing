<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact sécurisé Brevo</title>
<style>
  body { font-family: Arial, sans-serif; background: #f0f0f5; display:flex; justify-content:center; align-items:center; height:100vh; }
  form { background:#fff; padding:30px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.2); width:100%; max-width:400px; }
  label, input, textarea, button { width:100%; display:block; margin-top:15px; }
  input, textarea { padding:10px; border-radius:8px; border:1px solid #ccc; }
  button { padding:12px; border:none; border-radius:10px; background:#007bff; color:white; cursor:pointer; transition:0.3s; }
  button:hover { background:#0056b3; }
  .success, .error { margin-top:15px; font-weight:bold; text-align:center; opacity:0; transition:0.5s; }
  .show { opacity:1; }
  .success.show { color:green; }
  .error.show { color:red; }
</style>
</head>
<body>
<form id="contactForm">
  <h2 style="text-align:center;">Contactez-nous</h2>
  <label>Nom :</label>
  <input type="text" id="name" required>
  <label>Email :</label>
  <input type="email" id="email" required>
  <label>Message :</label>
  <textarea id="message" rows="5" required></textarea>
  <button type="submit">Être contacté</button>
  <p class="success" id="successMsg">Message envoyé avec succès !</p>
  <p class="error" id="errorMsg">Erreur lors de l'envoi.</p>
</form>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const message = document.getElementById('message').value.trim();
  const successMsg = document.getElementById('successMsg');
  const errorMsg = document.getElementById('errorMsg');

  try {
    const response = await fetch('/send', {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({ name, email, message })
    });

    if(response.ok){
      successMsg.classList.add('show');
      errorMsg.classList.remove('show');
      document.getElementById('contactForm').reset();
      setTimeout(()=>successMsg.classList.remove('show'), 4000);
    } else throw new Error('Erreur serveur');
  } catch(err){
    console.error(err);
    errorMsg.classList.add('show');
    successMsg.classList.remove('show');
    setTimeout(()=>errorMsg.classList.remove('show'), 4000);
  }
});
</script>
</body>
</html>
