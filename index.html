<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Brevo Premium</title>
<style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f0f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    form { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
    label { display: block; margin-top: 15px; font-weight: 500; }
    input, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; transition: border 0.3s; }
    input:focus, textarea:focus { border-color: #007bff; outline: none; }
    button { margin-top: 20px; width: 100%; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(90deg,#007bff,#0056b3); color: #fff; font-size: 16px; cursor: pointer; transition: all 0.3s ease; }
    button:hover { transform: scale(1.03); background: linear-gradient(90deg,#0056b3,#007bff); }
    button:active { transform: scale(0.98); }
    .success, .error { margin-top: 15px; opacity: 0; transition: opacity 0.5s; font-weight: bold; text-align: center; }
    .success.show { color: green; opacity: 1; }
    .error.show { color: red; opacity: 1; }
</style>
</head>
<body>

<form id="contactForm">
    <h2 style="text-align:center;">Contactez-nous</h2>

    <label for="name">Nom :</label>
    <input type="text" id="name" name="name" required>

    <label for="email">E-mail :</label>
    <input type="email" id="email" name="email" required>

    <label for="message">Message :</label>
    <textarea id="message" name="message" rows="5" required></textarea>

    <button type="submit">Être contacté</button>

    <p class="success" id="successMsg">Message envoyé avec succès !</p>
    <p class="error" id="errorMsg">Erreur lors de l'envoi.</p>
</form>

<script src="send-brevo.js"></script>
</body>
</html>
